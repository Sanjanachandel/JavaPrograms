#this is for doctor
server:
  port: 8989

spring:
  application:
    name: gateway-service

  cloud:
    gateway:
      routes:

        - id: employee-service
          uri: lb://EMPLOYEE-SERVICE
          predicates:
            - Path=/employee/**

        - id: help-service
          uri: lb://HELP-SERVICE
          predicates:
            - Path=/help/**

        - id: admin-service
          uri: lb://ADMIN-SERVICE
          predicates:
            - Path=/admin/**

        - id: customer-service
          uri: lb://CUSTOMERSERVICE
          predicates:
            - Path=/customer/**

        - id: demat-service
          uri: lb://DEMATACCOUNTSERVICE
          predicates:
            - Path=/demataccounts/**

        - id: loan-service
          uri: lb://LOANSERVICE
          predicates:
            - Path=/loans/**

        # NEW ROUTES

        - id: doctor-service
          uri: lb://DOCTOR-SERVICE
          predicates:
            - Path=/doctor/**

        - id: patient-service
          uri: lb://PATIENT-SERVICE
          predicates:
            - Path=/patient/**

        - id: appointment-service
          uri: lb://APPOINTMENT-SERVICE
          predicates:
            - Path=/appointment/**

eureka:
  client:
    register-with-eureka: true
    fetch-registry: true
    service-url:
      defaultZone: http://localhost:8761/eureka

  instance:
    hostname: localhost

