server:
  port: 8989

spring:
  application:
    name: gateway-service

  cloud:
    gateway:
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins: "*"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
            allowedHeaders: "*"
      routes:

        - id: user-service
          uri: lb://USER-SERVICE
          predicates:
            - Path=/users/**
          filters:
            - JwtAuthenticationFilter

        - id: operator-service
          uri: lb://OPERATOR-SERVICE
          predicates:
            - Path=/operators/**
          filters:
            - JwtAuthenticationFilter

        - id: recharge-service
          uri: lb://RECHARGE-SERVICE
          predicates:
            - Path=/recharges/**
          filters:
            - JwtAuthenticationFilter

        - id: payment-service
          uri: lb://PAYMENT-SERVICE
          predicates:
            - Path=/api/payments/**
          filters:
            - JwtAuthenticationFilter

        - id: notification-service
          uri: lb://NOTIFICATION-SERVICE
          predicates:
            - Path=/api/notifications/**
          filters:
            - JwtAuthenticationFilter

  # ✅ Zipkin Configuration
  zipkin:
    base-url: ${ZIPKIN_BASE_URL:http://zipkin:9411}

  # ✅ Sleuth Configuration
  sleuth:
    sampler:
      probability: 1.0

# ✅ Eureka Configuration
eureka:
  client:
    register-with-eureka: true
    fetch-registry: true
    service-url:
      defaultZone: ${EUREKA_DEFAULT_ZONE:http://eureka-server:8761/eureka/}

  instance:
    prefer-ip-address: true

# ✅ JWT Configuration
jwt:
  secret: ${JWT_SECRET:5367566B59703373367639792F423F4528482B4D6251655468576D5A71347437}
  expiration: 86400000

# ✅ Logging (for traceId & spanId in logs)
logging:
  pattern:
    level: "%5p [${spring.application.name},%X{X-B3-TraceId},%X{X-B3-SpanId}]"

# 📘 SpringDoc Centralized Swagger UI
springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true
    path: /swagger-ui.html
    urls:
      - name: User Service
        url: ${SWAGGER_USER_URL:/users/v3/api-docs}
      - name: Operator Service
        url: ${SWAGGER_OPERATOR_URL:/operators/v3/api-docs}
      - name: Recharge Service
        url: ${SWAGGER_RECHARGE_URL:/recharges/v3/api-docs}
      - name: Payment Service
        url: ${SWAGGER_PAYMENT_URL:/api/payments/v3/api-docs}
      - name: Notification Service
        url: ${SWAGGER_NOTIFICATION_URL:/api/notifications/v3/api-docs}