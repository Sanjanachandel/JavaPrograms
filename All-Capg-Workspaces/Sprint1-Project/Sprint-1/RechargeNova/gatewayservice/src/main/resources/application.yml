server:
  port: 8989

spring:
  application:
    name: gateway-service

  cloud:
    gateway:
      routes:

        - id: user-service
          uri: lb://USER-SERVICE
          predicates:
            - Path=/users/**
          filters:
            - JwtAuthenticationFilter

        - id: operator-service
          uri: lb://OPERATOR-SERVICE
          predicates:
            - Path=/operators/**
          filters:
            - JwtAuthenticationFilter

        - id: recharge-service
          uri: lb://RECHARGE-SERVICE
          predicates:
            - Path=/recharges/**
          filters:
            - JwtAuthenticationFilter

        - id: payment-service
          uri: lb://PAYMENT-SERVICE
          predicates:
            - Path=/api/payments/**
          filters:
            - JwtAuthenticationFilter

        - id: notification-service
          uri: lb://NOTIFICATION-SERVICE
          predicates:
            - Path=/api/notifications/**
          filters:
            - JwtAuthenticationFilter

eureka:
  client:
    register-with-eureka: true
    fetch-registry: true
    service-url:
      defaultZone: http://eureka-server:8761/eureka/   # ✅ FIXED

  instance:
    prefer-ip-address: true   # ✅ IMPORTANT

