server:
  port: 8084

spring:
  application:
    name: notification-service
  datasource:
    url: jdbc:oracle:thin:@localhost:1521/XEPDB1
    driverClassName: oracle.jdbc.OracleDriver
    username: notificationdb_admin
    password: password
  jpa:
    database-platform: org.hibernate.dialect.OracleDialect
    hibernate:
      ddl-auto: update
    show-sql: true
  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
