version: '3.8'

services:

  oracle-db:
    image: gvenzl/oracle-xe:21-slim
    container_name: oracle-db3
    ports:
      - "1522:1521"
    environment:
      ORACLE_PASSWORD: oracle
    volumes:
      - oracle-data:/opt/oracle/oradata

  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"

  eureka-server:
    build: ./eureka-server
    ports:
      - "8761:8761"
    depends_on:
      - oracle-db

  gateway-service:
    build: ./gatewayservice
    ports:
      - "8989:8989"
    depends_on:
      - eureka-server

  user-service:
    build: ./user-service
    ports:
      - "8082:8082"
    depends_on:
      - oracle-db
      - eureka-server

  operator-service:
    build: ./operator-service
    ports:
      - "8083:8083"
    depends_on:
      - oracle-db
      - eureka-server

  payment-service:
    build: ./payment-service
    ports:
      - "8084:8084"
    depends_on:
      - oracle-db
      - rabbitmq
      - eureka-server

  notification-service:
    build: ./notification-service
    ports:
      - "8085:8085"
    depends_on:
      - rabbitmq
      - eureka-server

  recharge-service:
    build: ./recharge-service
    ports:
      - "8086:8086"
    depends_on:
      - oracle-db
      - eureka-server
      - user-service
      - operator-service
      - payment-service

volumes:
  oracle-data: