server:
  port: 8084

spring:
  application:
    name: payment-service

  datasource:
    url: jdbc:oracle:thin:@//host.docker.internal:1521/xe
    driver-class-name: oracle.jdbc.OracleDriver
    username: scott
    password: tiger

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.OracleDialect

  rabbitmq:
    host: rabbitmq
    port: 5672
    username: guest
    password: guest

# ✅ Eureka
eureka:
  client:
    service-url:
      defaultZone: http://eureka-server:8761/eureka/

  instance:
    prefer-ip-address: true   # 🔥 REQUIRED

# 🔥 ✅ ADD THIS (Tracing for Spring Boot 3)
management:
  tracing:
    sampling:
      probability: 1.0

  zipkin:
    tracing:
      endpoint: http://zipkin:9411/api/v2/spans