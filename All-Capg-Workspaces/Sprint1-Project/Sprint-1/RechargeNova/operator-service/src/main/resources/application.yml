server:
  port: 8083

spring:
  application:
    name: operator-service

  datasource:
    url: jdbc:oracle:thin:@//host.docker.internal:1521/xe
    driver-class-name: oracle.jdbc.OracleDriver
    username: scott
    password: tiger

  jpa:
    hibernate:
      ddl-auto: update 
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.OracleDialect

# ✅ Eureka
eureka:
  client:
    service-url:
      defaultZone: http://eureka-server:8761/eureka/

  instance:
    prefer-ip-address: true   # 🔥 REQUIRED

# 🔥 ✅ ADD THIS (Spring Boot 3 Tracing)
management:
  tracing:
    sampling:
      probability: 1.0   # capture all requests

  zipkin:
    tracing:
      endpoint: http://zipkin:9411/api/v2/spans