server:
  port: 8086

spring:
  application:
    name: recharge-service

  datasource:
    url: jdbc:oracle:thin:@host.docker.internal:1521:XE
    driver-class-name: oracle.jdbc.OracleDriver   # ✅ FIXED
    username: scott
    password: tiger

  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        dialect: org.hibernate.dialect.OracleDialect
    show-sql: true

eureka:
  client:
    service-url:
      defaultZone: http://eureka-server:8761/eureka/

  instance:
    prefer-ip-address: true   # 🔥 MUST ADD

feign:
  client:
    config:
      default:
        connectTimeout: 5000
        readTimeout: 5000