<div class="modal-overlay" (click)="onCancel()">
  <div class="modal-content" (click)="$event.stopPropagation()">
    <div class="modal-header">
      <div class="icon-wrapper">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="logout-icon">
          <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
          <polyline points="16 17 21 12 16 7"></polyline>
          <line x1="21" y1="12" x2="9" y2="12"></line>
        </svg>
      </div>
      <h2>Confirm Logout</h2>
    </div>
    
    <div class="modal-body">
      <p>Are you sure you want to log out? You will need to sign in again to access your account.</p>
    </div>
    
    <div class="modal-footer">
      <button class="btn-cancel" (click)="onCancel()">Stay Logged In</button>
      <button class="btn-confirm" (click)="onConfirm()">Yes, Log Out</button>
    </div>
  </div>
</div>
