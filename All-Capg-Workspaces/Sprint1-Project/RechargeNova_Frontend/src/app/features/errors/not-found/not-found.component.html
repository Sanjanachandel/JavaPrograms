<div class="error-page">
  <div class="error-glow error-glow-purple"></div>
  <div class="error-card">
    <div class="error-code">404</div>
    <div class="error-emoji">🧭</div>
    <h1 class="error-title">Page Not Found</h1>
    <p class="error-desc">We couldn't find the page you're looking for. It might have been moved or doesn't exist.</p>
    <div class="error-actions">
      <a routerLink="/" id="err-404-home" class="btn-primary-err">🏠 Go Home</a>
      <button onclick="history.back()" id="err-404-back" class="btn-ghost-err">← Go Back</button>
    </div>
  </div>
</div>
